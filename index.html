<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refinance Calculator</title>
    <style>
        body {
            background: linear-gradient(to right, #ffffff, #e6e6e6);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .tabs {
            display: flex;
            justify-content: space-around;
            background-color: #f1f1f1;
            padding: 10px;
            border-radius: 5px;
        }
        .tab {
            cursor: pointer;
            padding: 10px 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .tab:hover {
            background-color: #ddd;
        }
        .chart {
            margin-top: 20px;
        }
        form fieldset {
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ccc;
        }
        form label {
            display: inline-block;
            width: 150px;
        }
        form input {
            width: 150px;
            margin-bottom: 5px;
        }
        .amort-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .amort-table th, .amort-table td {
            border: 1px solid #ccc;
            padding: 4px 6px;
            text-align: right;
        }
        .amort-table th {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <h1>Refinance Calculator</h1>
    <!-- calculator input form -->
    <form id="calculatorForm">
        <fieldset>
            <legend>Current Loan</legend>
            <label for="currentAmount">Loan amount:</label>
            <input type="number" id="currentAmount" required step="0.01" value="200000"><br>
            <label for="currentRate">Interest rate (%):</label>
            <input type="number" id="currentRate" required step="0.01" value="4.5"><br>
            <label for="currentTerm">Term (years):</label>
            <input type="number" id="currentTerm" required value="30"><br>
        </fieldset>
        <fieldset>
            <legend>New Loan</legend>
            <label for="newAmount">Loan amount:</label>
            <input type="number" id="newAmount" step="0.01" value="200000"><br>
            <label for="newRate">Interest rate (%):</label>
            <input type="number" id="newRate" required step="0.01" value="3.5"><br>
            <label for="newTerm">Term (years):</label>
            <input type="number" id="newTerm" required value="30"><br>
        </fieldset>
        <button type="submit">Calculate</button>
    </form>
    <div class="tabs">
        <div class="tab" onclick="showTab('currentSchedule')">Current Loan Schedule</div>
        <div class="tab" onclick="showTab('newSchedule')">New Loan Schedule</div>
        <div class="tab" onclick="showTab('comparison')">Side-by-Side Comparison</div>
    </div>
    <div id="currentSchedule" class="chart">
        <h2>Current Loan Schedule</h2>
        <!-- Amortization Chart Logic Here -->
    </div>
    <div id="newSchedule" class="chart" style="display:none;">
        <h2>New Loan Schedule</h2>
        <!-- Amortization Chart Logic Here -->
    </div>
    <div id="comparison" class="chart" style="display:none;">
        <h2>Side-by-Side Comparison</h2>
        <!-- Comparison Logic Here -->
    </div>
    <script>
        function showTab(tabName) {
            document.getElementById('currentSchedule').style.display = 'none';
            document.getElementById('newSchedule').style.display = 'none';
            document.getElementById('comparison').style.display = 'none';
            document.getElementById(tabName).style.display = 'block';
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
